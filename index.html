<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VOC分析ダッシュボード（統合版）</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
            background: #f5f7fa;
            color: #333;
        }

        .header {
            background: linear-gradient(135deg, #2c3e50 0%, #34495e 100%);
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 8px rgba(0,0,0,.15);
        }

        .header h1 {
            font-size: 24px;
            color: #fff;
            font-weight: 600;
        }

        .header-controls {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .data-source-indicator {
            padding: 8px 16px;
            background: rgba(255,255,255,.15);
            border-radius: 20px;
            font-size: 12px;
            color: #fff;
            font-weight: 500;
        }

        .nav-tabs {
            display: flex;
            background: #fff;
            border-bottom: 1px solid #e1e8ed;
            box-shadow: 0 2px 8px rgba(0,0,0,.1);
        }

        .nav-tab {
            flex: 1;
            padding: 14px 20px;
            background: #fff;
            border: none;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            color: #666;
            border-bottom: 3px solid transparent;
            transition: all .3s;
        }

        .nav-tab.active {
            background: #f8f9ff;
            color: #667eea;
            border-bottom-color: #667eea;
        }

        .nav-tab:hover:not(.active) {
            background: #f8f9fa;
            color: #333;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all .2s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .btn-primary {
            background: #3498db;
            color: #fff;
        }

        .btn-primary:hover {
            background: #2980b9;
        }

        .btn-secondary {
            background: #95a5a6;
            color: #fff;
        }

        .btn-secondary:hover {
            background: #7f8c8d;
        }

        .btn-success {
            background: #27ae60;
            color: #fff;
        }

        .btn-success:hover {
            background: #219a52;
        }

        .kpi-section {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin: 24px 40px;
        }

        .kpi-card {
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 1px 3px rgba(0,0,0,.1);
            border: 1px solid #e1e8ed;
            display: flex;
            align-items: center;
            gap: 14px;
            transition: all .2s;
        }

        .kpi-card:hover {
            box-shadow: 0 4px 12px rgba(0,0,0,.08);
            border-color: #3498db;
        }

        .kpi-icon {
            font-size: 36px;
        }

        .kpi-content {
            flex: 1;
        }

        .kpi-label {
            font-size: 12px;
            color: #7f8c8d;
            margin-bottom: 4px;
            font-weight: 500;
        }

        .kpi-value {
            font-size: 26px;
            font-weight: 700;
            color: #2c3e50;
        }

        .charts-section {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(380px, 1fr));
            gap: 20px;
            margin: 24px 40px;
        }

        .chart-container {
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 1px 3px rgba(0,0,0,.1);
            border: 1px solid #e1e8ed;
        }

        .chart-container h2 {
            font-size: 15px;
            margin-bottom: 16px;
            color: #2c3e50;
            font-weight: 600;
        }

        .chart-full {
            grid-column: 1 / -1;
        }

        .section {
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 1px 3px rgba(0,0,0,.1);
            border: 1px solid #e1e8ed;
            margin: 24px 40px;
        }

        .section h2 {
            font-size: 15px;
            margin-bottom: 16px;
            color: #2c3e50;
            font-weight: 600;
        }

        .filters {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            align-items: flex-end;
        }

        .filter-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .filter-group label {
            font-size: 13px;
            font-weight: 600;
            color: #666;
        }

        .filter-select, .filter-input {
            padding: 8px 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 13px;
            min-width: 160px;
        }

        .filter-select:focus, .filter-input:focus {
            outline: none;
            border-color: #667eea;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }

        th {
            background: #f8f9fa;
            padding: 10px 12px;
            text-align: left;
            font-weight: 600;
            color: #555;
            border-bottom: 2px solid #e1e8ed;
            white-space: nowrap;
        }

        td {
            padding: 9px 12px;
            border-bottom: 1px solid #f0f0f0;
            color: #333;
        }

        tr:hover td {
            background: #f8f9ff;
        }

        tr.clickable {
            cursor: pointer;
        }

        .badge {
            padding: 3px 10px;
            border-radius: 10px;
            font-size: 11px;
            font-weight: 600;
            display: inline-block;
        }

        .badge-resolved {
            background: #d4edda;
            color: #155724;
        }

        .badge-unresolved {
            background: #fff3cd;
            color: #856404;
        }

        .badge-high {
            background: #f8d7da;
            color: #721c24;
        }

        .badge-mid {
            background: #fff3cd;
            color: #856404;
        }

        .badge-low {
            background: #d1ecf1;
            color: #0c5460;
        }

        .pagination {
            display: flex;
            gap: 8px;
            align-items: center;
            justify-content: center;
            margin-top: 16px;
        }

        .page-btn {
            padding: 6px 12px;
            border: 1px solid #ddd;
            border-radius: 4px;
            background: #fff;
            cursor: pointer;
            font-size: 13px;
        }

        .page-btn.active {
            background: #667eea;
            color: #fff;
            border-color: #667eea;
        }

        .page-btn:hover:not(.active) {
            background: #f0f0f0;
        }

        .modal {
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,.6);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background: #fff;
            padding: 28px;
            border-radius: 12px;
            width: 90%;
            max-width: 860px;
            max-height: 88vh;
            overflow-y: auto;
            position: relative;
        }

        .modal-close {
            position: absolute;
            right: 18px;
            top: 14px;
            font-size: 28px;
            cursor: pointer;
            color: #aaa;
            line-height: 1;
        }

        .modal-close:hover {
            color: #333;
        }

        .modal-title {
            font-size: 20px;
            margin-bottom: 16px;
            color: #667eea;
            font-weight: 600;
        }

        .modal-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 12px;
            margin-bottom: 16px;
            padding: 14px;
            background: #f8f9ff;
            border-radius: 8px;
        }

        .modal-field label {
            font-size: 11px;
            color: #888;
            font-weight: 600;
            margin-bottom: 3px;
            display: block;
        }

        .modal-field span {
            font-size: 14px;
            color: #333;
        }

        .modal-section {
            margin-top: 16px;
        }

        .modal-section h3 {
            font-size: 15px;
            margin-bottom: 8px;
            color: #444;
        }

        .conversation-box {
            background: #f8f9fa;
            padding: 14px;
            border-radius: 8px;
            white-space: pre-wrap;
            font-size: 13px;
            line-height: 1.8;
            max-height: 300px;
            overflow-y: auto;
        }

        .op-card {
            background: #fff;
            padding: 18px;
            border-radius: 8px;
            border: 2px solid #f0f0f0;
            transition: all .3s;
            cursor: pointer;
        }

        .op-card:hover {
            border-color: #667eea;
            background: #f8f9ff;
            transform: translateY(-2px);
        }

        .op-name {
            font-size: 18px;
            font-weight: 700;
            color: #2c3e50;
            margin-bottom: 14px;
            text-align: center;
        }

        .op-stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 12px;
        }

        .op-stat-label {
            font-size: 11px;
            color: #888;
            margin-bottom: 3px;
        }

        .op-stat-value {
            font-size: 20px;
            font-weight: 700;
            color: #2c3e50;
        }

        .score-bar {
            background: #e0e0e0;
            border-radius: 10px;
            height: 8px;
            overflow: hidden;
            margin-top: 8px;
        }

        .score-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #4BC0C0);
            transition: width .5s;
        }

        .op-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 16px;
        }

        .loading {
            text-align: center;
            padding: 40px;
            font-size: 16px;
            color: #888;
        }

        .error {
            text-align: center;
            padding: 40px;
            font-size: 16px;
            color: #e74c3c;
        }

        .data-source-badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 600;
            margin-left: 8px;
        }

        .source-call {
            background: #e3f2fd;
            color: #1976d2;
        }

        .source-form {
            background: #f3e5f5;
            color: #7b1fa2;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>📊 VOC分析ダッシュボード（統合版）</h1>
        <div class="header-controls">
            <div class="data-source-indicator" id="dataSourceIndicator">
                📞 通話データのみ
            </div>
        </div>
    </div>

    <div class="nav-tabs">
        <button class="nav-tab active" onclick="switchTab('overview')">📈 概要</button>
        <button class="nav-tab" onclick="switchTab('categories')">📂 カテゴリ分析</button>
        <button class="nav-tab" onclick="switchTab('operators')">👤 オペレーター分析</button>
        <button class="nav-tab" onclick="switchTab('details')">📋 詳細データ</button>
    </div>

    <!-- 概要タブ -->
    <div id="overview" class="tab-content active">
        <div class="kpi-section" id="kpiSection">
            <div class="loading">データを読み込み中...</div>
        </div>

        <div class="charts-section" id="chartsSection">
            <div class="loading">チャートを生成中...</div>
        </div>
    </div>

    <!-- カテゴリ分析タブ -->
    <div id="categories" class="tab-content">
        <div class="section">
            <h2>📂 大区分・小区分分析</h2>
            <div class="charts-section">
                <div class="chart-container">
                    <h2>大区分別件数</h2>
                    <canvas id="majorCategoryChart" style="height: 300px;"></canvas>
                </div>
                <div class="chart-container">
                    <h2>小区分別TOP20</h2>
                    <canvas id="minorCategoryChart" style="height: 300px;"></canvas>
                </div>
            </div>
        </div>

        <div class="section">
            <h2>🎯 Intent & Barrier分析</h2>
            <div class="charts-section">
                <div class="chart-container">
                    <h2>ユーザー意図（Intent）TOP15</h2>
                    <canvas id="intentChart" style="height: 300px;"></canvas>
                </div>
                <div class="chart-container">
                    <h2>Webバリア TOP15</h2>
                    <canvas id="barrierChart" style="height: 300px;"></canvas>
                </div>
            </div>
        </div>
    </div>

    <!-- オペレーター分析タブ -->
    <div id="operators" class="tab-content">
        <div class="section">
            <h2>👤 オペレーター別パフォーマンス</h2>
            <div class="filters">
                <div class="filter-group">
                    <label>ソート基準</label>
                    <select class="filter-select" id="opSortBy" onchange="renderOperators()">
                        <option value="count">対応件数</option>
                        <option value="avgScore">平均スコア</option>
                        <option value="knowledge">知識正確性</option>
                        <option value="system">システム操作</option>
                        <option value="clarity">説明分かりやすさ</option>
                    </select>
                </div>
            </div>
            <div class="op-grid" id="operatorGrid">
                <div class="loading">データを読み込み中...</div>
            </div>
        </div>
    </div>

    <!-- 詳細データタブ -->
    <div id="details" class="tab-content">
        <div class="section">
            <h2>🔍 フィルター</h2>
            <div class="filters">
                <div class="filter-group">
                    <label>データソース</label>
                    <select class="filter-select" id="filterDataSource" onchange="applyFilters()">
                        <option value="all">全て</option>
                        <option value="call">通話データ</option>
                        <option value="form">フォームデータ</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label>大区分</label>
                    <select class="filter-select" id="filterMajorCategory" onchange="applyFilters()">
                        <option value="">全て</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label>緊急度</label>
                    <select class="filter-select" id="filterUrgency" onchange="applyFilters()">
                        <option value="">全て</option>
                        <option value="高">高</option>
                        <option value="中">中</option>
                        <option value="低">低</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label>キーワード検索</label>
                    <input type="text" class="filter-input" id="filterKeyword" placeholder="キーワードで検索" onkeyup="applyFilters()">
                </div>
                <button class="btn btn-secondary" onclick="resetFilters()">リセット</button>
            </div>
        </div>

        <div class="section">
            <h2>📋 データ一覧 (<span id="recordCount">0</span>件)</h2>
            <div style="overflow-x: auto;">
                <table id="dataTable">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>日時</th>
                            <th>ソース</th>
                            <th>大区分</th>
                            <th>小区分</th>
                            <th>Intent</th>
                            <th>緊急度</th>
                            <th>要約</th>
                        </tr>
                    </thead>
                    <tbody id="dataTableBody">
                        <tr><td colspan="8" class="loading">データを読み込み中...</td></tr>
                    </tbody>
                </table>
            </div>
            <div class="pagination" id="pagination"></div>
        </div>
    </div>

    <!-- 詳細モーダル -->
    <div id="detailModal" class="modal" style="display: none;">
        <div class="modal-content">
            <span class="modal-close" onclick="closeModal()">&times;</span>
            <div class="modal-title" id="modalTitle">通話詳細</div>
            <div class="modal-grid" id="modalFields"></div>
            <div class="modal-section">
                <h3>会話全文</h3>
                <div class="conversation-box" id="modalConversation"></div>
            </div>
        </div>
    </div>

    <script>
        // グローバル変数
        let allData = {
            calls: [],  // 通話データ
            forms: []   // フォームデータ（後で追加）
        };
        let filteredData = [];
        let currentPage = 1;
        const itemsPerPage = 50;
        let charts = {};

        // CSVファイルを読み込む
        async function loadData() {
            try {
                // 通話データを読み込み
                const callResponse = await fetch('all_merged.csv');
                if (!callResponse.ok) throw new Error('通話データが見つかりません');
                
                const callText = await callResponse.text();
                const callParsed = Papa.parse(callText, { 
                    header: true, 
                    skipEmptyLines: true,
                    encoding: 'UTF-8'
                });
                
                allData.calls = callParsed.data.map(row => ({
                    ...row,
                    _source: 'call'  // データソースを識別
                }));

                // フォームデータも試しに読み込む（なければスキップ）
                try {
                    const formResponse = await fetch('form_merged.csv');
                    if (formResponse.ok) {
                        const formText = await formResponse.text();
                        const formParsed = Papa.parse(formText, { 
                            header: true, 
                            skipEmptyLines: true,
                            encoding: 'UTF-8'
                        });
                        allData.forms = formParsed.data.map(row => ({
                            ...row,
                            _source: 'form'
                        }));
                        updateDataSourceIndicator(true);
                    }
                } catch (e) {
                    console.log('フォームデータはまだありません');
                }

                // データを統合
                filteredData = [...allData.calls, ...allData.forms];
                
                // ダッシュボードを更新
                renderKPIs();
                renderCharts();
                renderOperators();
                renderTable();
                populateFilters();
            } catch (error) {
                console.error('データ読み込みエラー:', error);
                document.getElementById('kpiSection').innerHTML = `<div class="error">データの読み込みに失敗しました: ${error.message}</div>`;
            }
        }

        // データソースインジケーターを更新
        function updateDataSourceIndicator(hasFormData) {
            const indicator = document.getElementById('dataSourceIndicator');
            if (hasFormData) {
                indicator.textContent = '📞 通話 + 📝 フォームデータ';
            } else {
                indicator.textContent = '📞 通話データのみ';
            }
        }

        // KPIを描画
        function renderKPIs() {
            const totalRecords = filteredData.length;
            const callRecords = allData.calls.length;
            const formRecords = allData.forms.length;
            
            // 緊急度の集計
            const urgencyCount = {
                '高': 0,
                '中': 0,
                '低': 0
            };
            filteredData.forEach(row => {
                const urg = row['緊急度'] || '不明';
                if (urgencyCount[urg] !== undefined) urgencyCount[urg]++;
            });

            // 自己解決可能性
            const selfResolvable = filteredData.filter(row => row['Web自己解決可能性'] === '高').length;
            const selfResolvableRate = totalRecords > 0 ? ((selfResolvable / totalRecords) * 100).toFixed(1) : 0;

            // ユニークオペレーター数（通話データのみ）
            const uniqueOps = new Set(allData.calls.map(row => row['オペレーター名']).filter(op => op && op !== '不明'));

            const kpiHTML = `
                <div class="kpi-card">
                    <div class="kpi-icon">📊</div>
                    <div class="kpi-content">
                        <div class="kpi-label">総レコード数</div>
                        <div class="kpi-value">${totalRecords.toLocaleString()}</div>
                    </div>
                </div>
                <div class="kpi-card">
                    <div class="kpi-icon">📞</div>
                    <div class="kpi-content">
                        <div class="kpi-label">通話データ</div>
                        <div class="kpi-value">${callRecords.toLocaleString()}</div>
                    </div>
                </div>
                <div class="kpi-card">
                    <div class="kpi-icon">📝</div>
                    <div class="kpi-content">
                        <div class="kpi-label">フォームデータ</div>
                        <div class="kpi-value">${formRecords.toLocaleString()}</div>
                    </div>
                </div>
                <div class="kpi-card">
                    <div class="kpi-icon">🚨</div>
                    <div class="kpi-content">
                        <div class="kpi-label">緊急度：高</div>
                        <div class="kpi-value">${urgencyCount['高'].toLocaleString()}</div>
                    </div>
                </div>
                <div class="kpi-card">
                    <div class="kpi-icon">✅</div>
                    <div class="kpi-content">
                        <div class="kpi-label">自己解決可能率</div>
                        <div class="kpi-value">${selfResolvableRate}%</div>
                    </div>
                </div>
                <div class="kpi-card">
                    <div class="kpi-icon">👥</div>
                    <div class="kpi-content">
                        <div class="kpi-label">オペレーター数</div>
                        <div class="kpi-value">${uniqueOps.size}</div>
                    </div>
                </div>
            `;

            document.getElementById('kpiSection').innerHTML = kpiHTML;
        }

        // チャートを描画
        function renderCharts() {
            const chartsHTML = `
                <div class="chart-container">
                    <h2>大区分別件数</h2>
                    <canvas id="overviewMajorChart" style="height: 300px;"></canvas>
                </div>
                <div class="chart-container">
                    <h2>緊急度分布</h2>
                    <canvas id="urgencyChart" style="height: 300px;"></canvas>
                </div>
                <div class="chart-container chart-full">
                    <h2>日別問い合わせ件数推移</h2>
                    <canvas id="timeSeriesChart" style="height: 250px;"></canvas>
                </div>
            `;
            document.getElementById('chartsSection').innerHTML = chartsHTML;

            // 大区分別チャート
            const majorCategories = {};
            filteredData.forEach(row => {
                const cat = row['大区分名'] || '不明';
                majorCategories[cat] = (majorCategories[cat] || 0) + 1;
            });
            const majorSorted = Object.entries(majorCategories).sort((a, b) => b[1] - a[1]).slice(0, 10);
            
            charts.overviewMajor = new Chart(document.getElementById('overviewMajorChart'), {
                type: 'bar',
                data: {
                    labels: majorSorted.map(x => x[0]),
                    datasets: [{
                        label: '件数',
                        data: majorSorted.map(x => x[1]),
                        backgroundColor: 'rgba(102, 126, 234, 0.8)'
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false }
                    }
                }
            });

            // 緊急度チャート
            const urgencyData = {
                '高': 0,
                '中': 0,
                '低': 0,
                '不明': 0
            };
            filteredData.forEach(row => {
                const urg = row['緊急度'] || '不明';
                if (urgencyData[urg] !== undefined) {
                    urgencyData[urg]++;
                } else {
                    urgencyData['不明']++;
                }
            });

            charts.urgency = new Chart(document.getElementById('urgencyChart'), {
                type: 'doughnut',
                data: {
                    labels: Object.keys(urgencyData),
                    datasets: [{
                        data: Object.values(urgencyData),
                        backgroundColor: ['#e74c3c', '#f39c12', '#3498db', '#95a5a6']
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false
                }
            });

            // 日別推移チャート
            const dateField = filteredData[0]._source === 'call' ? '通話日時' : 'お問い合わせ日';
            const dailyCounts = {};
            filteredData.forEach(row => {
                const dateStr = row[dateField] || row['通話日時'] || row['お問い合わせ日'] || '';
                const date = dateStr.split(' ')[0];
                if (date) {
                    dailyCounts[date] = (dailyCounts[date] || 0) + 1;
                }
            });
            const sortedDates = Object.keys(dailyCounts).sort();
            const last30Dates = sortedDates.slice(-30);

            charts.timeSeries = new Chart(document.getElementById('timeSeriesChart'), {
                type: 'line',
                data: {
                    labels: last30Dates,
                    datasets: [{
                        label: '問い合わせ件数',
                        data: last30Dates.map(d => dailyCounts[d]),
                        borderColor: '#667eea',
                        backgroundColor: 'rgba(102, 126, 234, 0.1)',
                        tension: 0.4,
                        fill: true
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false }
                    }
                }
            });

            // カテゴリタブのチャート
            renderCategoryCharts();
        }

        // カテゴリチャートを描画
        function renderCategoryCharts() {
            // 大区分
            const majorCategories = {};
            filteredData.forEach(row => {
                const cat = row['大区分名'] || '不明';
                majorCategories[cat] = (majorCategories[cat] || 0) + 1;
            });
            const majorSorted = Object.entries(majorCategories).sort((a, b) => b[1] - a[1]);

            if (charts.majorCategory) charts.majorCategory.destroy();
            charts.majorCategory = new Chart(document.getElementById('majorCategoryChart'), {
                type: 'bar',
                data: {
                    labels: majorSorted.map(x => x[0]),
                    datasets: [{
                        label: '件数',
                        data: majorSorted.map(x => x[1]),
                        backgroundColor: 'rgba(102, 126, 234, 0.8)'
                    }]
                },
                options: {
                    indexAxis: 'y',
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false }
                    }
                }
            });

            // 小区分TOP20
            const minorCategories = {};
            filteredData.forEach(row => {
                const cat = row['小区分名'] || '不明';
                minorCategories[cat] = (minorCategories[cat] || 0) + 1;
            });
            const minorSorted = Object.entries(minorCategories).sort((a, b) => b[1] - a[1]).slice(0, 20);

            if (charts.minorCategory) charts.minorCategory.destroy();
            charts.minorCategory = new Chart(document.getElementById('minorCategoryChart'), {
                type: 'bar',
                data: {
                    labels: minorSorted.map(x => x[0]),
                    datasets: [{
                        label: '件数',
                        data: minorSorted.map(x => x[1]),
                        backgroundColor: 'rgba(52, 152, 219, 0.8)'
                    }]
                },
                options: {
                    indexAxis: 'y',
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false }
                    }
                }
            });

            // Intent分析
            const intents = {};
            filteredData.forEach(row => {
                const intent = row['ユーザーの意図(Intent)'] || '不明';
                intents[intent] = (intents[intent] || 0) + 1;
            });
            const intentSorted = Object.entries(intents).sort((a, b) => b[1] - a[1]).slice(0, 15);

            if (charts.intent) charts.intent.destroy();
            charts.intent = new Chart(document.getElementById('intentChart'), {
                type: 'bar',
                data: {
                    labels: intentSorted.map(x => x[0]),
                    datasets: [{
                        label: '件数',
                        data: intentSorted.map(x => x[1]),
                        backgroundColor: 'rgba(46, 204, 113, 0.8)'
                    }]
                },
                options: {
                    indexAxis: 'y',
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false }
                    }
                }
            });

            // Barrier分析
            const barriers = {};
            filteredData.forEach(row => {
                const barrier = row['Webサイトのバリア(Barrier)'] || '不明';
                if (barrier !== 'なし' && barrier !== '不明') {
                    barriers[barrier] = (barriers[barrier] || 0) + 1;
                }
            });
            const barrierSorted = Object.entries(barriers).sort((a, b) => b[1] - a[1]).slice(0, 15);

            if (charts.barrier) charts.barrier.destroy();
            charts.barrier = new Chart(document.getElementById('barrierChart'), {
                type: 'bar',
                data: {
                    labels: barrierSorted.map(x => x[0]),
                    datasets: [{
                        label: '件数',
                        data: barrierSorted.map(x => x[1]),
                        backgroundColor: 'rgba(231, 76, 60, 0.8)'
                    }]
                },
                options: {
                    indexAxis: 'y',
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false }
                    }
                }
            });
        }

        // オペレーター分析を描画
        function renderOperators() {
            const sortBy = document.getElementById('opSortBy').value;
            const operators = {};

            // 通話データのみからオペレーター情報を集計
            allData.calls.forEach(row => {
                const opName = row['オペレーター名'];
                if (!opName || opName === '不明') return;

                if (!operators[opName]) {
                    operators[opName] = {
                        name: opName,
                        count: 0,
                        totalScore: 0,
                        knowledge: 0,
                        system: 0,
                        clarity: 0,
                        empathy: 0,
                        listening: 0,
                        scores: []
                    };
                }

                operators[opName].count++;
                const overallScore = parseFloat(row['OP総合評価']) || 0;
                operators[opName].totalScore += overallScore;
                operators[opName].knowledge += parseFloat(row['OP知識正確性']) || 0;
                operators[opName].system += parseFloat(row['OPシステム操作']) || 0;
                operators[opName].clarity += parseFloat(row['OP説明分かりやすさ']) || 0;
                operators[opName].empathy += parseFloat(row['OP共感・寄り添い']) || 0;
                operators[opName].listening += parseFloat(row['OP傾聴姿勢']) || 0;
            });

            // 平均を計算
            Object.values(operators).forEach(op => {
                if (op.count > 0) {
                    op.avgScore = op.totalScore / op.count;
                    op.avgKnowledge = op.knowledge / op.count;
                    op.avgSystem = op.system / op.count;
                    op.avgClarity = op.clarity / op.count;
                    op.avgEmpathy = op.empathy / op.count;
                    op.avgListening = op.listening / op.count;
                }
            });

            // ソート
            let opArray = Object.values(operators);
            switch(sortBy) {
                case 'count':
                    opArray.sort((a, b) => b.count - a.count);
                    break;
                case 'avgScore':
                    opArray.sort((a, b) => b.avgScore - a.avgScore);
                    break;
                case 'knowledge':
                    opArray.sort((a, b) => b.avgKnowledge - a.avgKnowledge);
                    break;
                case 'system':
                    opArray.sort((a, b) => b.avgSystem - a.avgSystem);
                    break;
                case 'clarity':
                    opArray.sort((a, b) => b.avgClarity - a.avgClarity);
                    break;
            }

            const opHTML = opArray.map(op => `
                <div class="op-card">
                    <div class="op-name">${op.name}</div>
                    <div class="op-stats">
                        <div>
                            <div class="op-stat-label">対応件数</div>
                            <div class="op-stat-value">${op.count}</div>
                        </div>
                        <div>
                            <div class="op-stat-label">平均スコア</div>
                            <div class="op-stat-value">${op.avgScore.toFixed(1)}</div>
                        </div>
                    </div>
                    <div style="margin-top: 10px;">
                        <div style="font-size: 11px; color: #888; margin-bottom: 4px;">知識正確性: ${op.avgKnowledge.toFixed(1)}</div>
                        <div class="score-bar">
                            <div class="score-fill" style="width: ${(op.avgKnowledge / 5) * 100}%"></div>
                        </div>
                    </div>
                    <div style="margin-top: 8px;">
                        <div style="font-size: 11px; color: #888; margin-bottom: 4px;">説明分かりやすさ: ${op.avgClarity.toFixed(1)}</div>
                        <div class="score-bar">
                            <div class="score-fill" style="width: ${(op.avgClarity / 5) * 100}%"></div>
                        </div>
                    </div>
                </div>
            `).join('');

            document.getElementById('operatorGrid').innerHTML = opHTML || '<div class="loading">オペレーターデータがありません</div>';
        }

        // テーブルを描画
        function renderTable() {
            const start = (currentPage - 1) * itemsPerPage;
            const end = start + itemsPerPage;
            const pageData = filteredData.slice(start, end);

            const rows = pageData.map(row => {
                const id = row['通話ID'] || row['問い合わせID'] || '';
                const dateTime = row['通話日時'] || row['お問い合わせ日'] || '';
                const source = row._source === 'call' ? '通話' : 'フォーム';
                const majorCat = row['大区分名'] || '';
                const minorCat = row['小区分名'] || '';
                const intent = row['ユーザーの意図(Intent)'] || '';
                const urgency = row['緊急度'] || '';
                const summary = row['会話要約'] || row['問い合わせ要約'] || '';

                let urgencyBadge = '';
                if (urgency === '高') urgencyBadge = '<span class="badge badge-high">高</span>';
                else if (urgency === '中') urgencyBadge = '<span class="badge badge-mid">中</span>';
                else if (urgency === '低') urgencyBadge = '<span class="badge badge-low">低</span>';

                const sourceBadge = source === '通話' 
                    ? '<span class="data-source-badge source-call">📞 通話</span>'
                    : '<span class="data-source-badge source-form">📝 フォーム</span>';

                return `
                    <tr class="clickable" onclick='showDetail(${JSON.stringify(row)})'>
                        <td>${id}</td>
                        <td>${dateTime}</td>
                        <td>${sourceBadge}</td>
                        <td>${majorCat}</td>
                        <td>${minorCat}</td>
                        <td>${intent.substring(0, 30)}${intent.length > 30 ? '...' : ''}</td>
                        <td>${urgencyBadge}</td>
                        <td>${summary.substring(0, 50)}${summary.length > 50 ? '...' : ''}</td>
                    </tr>
                `;
            }).join('');

            document.getElementById('dataTableBody').innerHTML = rows || '<tr><td colspan="8">データがありません</td></tr>';
            document.getElementById('recordCount').textContent = filteredData.length;

            renderPagination();
        }

        // ページネーションを描画
        function renderPagination() {
            const totalPages = Math.ceil(filteredData.length / itemsPerPage);
            let paginationHTML = '';

            if (currentPage > 1) {
                paginationHTML += `<button class="page-btn" onclick="changePage(${currentPage - 1})">前へ</button>`;
            }

            const startPage = Math.max(1, currentPage - 2);
            const endPage = Math.min(totalPages, currentPage + 2);

            for (let i = startPage; i <= endPage; i++) {
                paginationHTML += `<button class="page-btn ${i === currentPage ? 'active' : ''}" onclick="changePage(${i})">${i}</button>`;
            }

            if (currentPage < totalPages) {
                paginationHTML += `<button class="page-btn" onclick="changePage(${currentPage + 1})">次へ</button>`;
            }

            document.getElementById('pagination').innerHTML = paginationHTML;
        }

        // ページ変更
        function changePage(page) {
            currentPage = page;
            renderTable();
        }

        // フィルターを適用
        function applyFilters() {
            const dataSourceFilter = document.getElementById('filterDataSource').value;
            const majorCatFilter = document.getElementById('filterMajorCategory').value;
            const urgencyFilter = document.getElementById('filterUrgency').value;
            const keywordFilter = document.getElementById('filterKeyword').value.toLowerCase();

            filteredData = [...allData.calls, ...allData.forms].filter(row => {
                // データソースフィルター
                if (dataSourceFilter !== 'all' && row._source !== dataSourceFilter) return false;

                // 大区分フィルター
                if (majorCatFilter && row['大区分名'] !== majorCatFilter) return false;

                // 緊急度フィルター
                if (urgencyFilter && row['緊急度'] !== urgencyFilter) return false;

                // キーワードフィルター
                if (keywordFilter) {
                    const searchFields = [
                        row['会話要約'] || '',
                        row['問い合わせ要約'] || '',
                        row['ユーザーの意図(Intent)'] || '',
                        row['小区分名'] || '',
                        row['重要キーワード'] || ''
                    ];
                    if (!searchFields.some(field => field.toLowerCase().includes(keywordFilter))) {
                        return false;
                    }
                }

                return true;
            });

            currentPage = 1;
            renderTable();
        }

        // フィルターをリセット
        function resetFilters() {
            document.getElementById('filterDataSource').value = 'all';
            document.getElementById('filterMajorCategory').value = '';
            document.getElementById('filterUrgency').value = '';
            document.getElementById('filterKeyword').value = '';
            applyFilters();
        }

        // フィルター選択肢を設定
        function populateFilters() {
            const majorCategories = new Set();
            filteredData.forEach(row => {
                const cat = row['大区分名'];
                if (cat) majorCategories.add(cat);
            });

            const majorCatSelect = document.getElementById('filterMajorCategory');
            majorCategories.forEach(cat => {
                const option = document.createElement('option');
                option.value = cat;
                option.textContent = cat;
                majorCatSelect.appendChild(option);
            });
        }

        // 詳細モーダルを表示
        function showDetail(row) {
            const isCall = row._source === 'call';
            
            document.getElementById('modalTitle').textContent = isCall ? '通話詳細' : 'フォーム問い合わせ詳細';

            const fields = isCall ? [
                { label: '通話ID', value: row['通話ID'] },
                { label: '通話日時', value: row['通話日時'] },
                { label: 'オペレーター名', value: row['オペレーター名'] },
                { label: '顧客属性', value: row['顧客属性'] },
                { label: '大区分', value: row['大区分名'] },
                { label: '小区分', value: row['小区分名'] },
                { label: 'Intent', value: row['ユーザーの意図(Intent)'] },
                { label: 'Barrier', value: row['Webサイトのバリア(Barrier)'] },
                { label: '緊急度', value: row['緊急度'] },
                { label: '自己解決可能性', value: row['Web自己解決可能性'] },
                { label: 'OP総合評価', value: row['OP総合評価'] },
                { label: 'OP知識正確性', value: row['OP知識正確性'] }
            ] : [
                { label: '問い合わせID', value: row['問い合わせID'] },
                { label: 'お問い合わせ日', value: row['お問い合わせ日'] },
                { label: '顧客属性', value: row['顧客属性'] },
                { label: '大区分', value: row['大区分名'] },
                { label: '小区分', value: row['小区分名'] },
                { label: 'Intent', value: row['ユーザーの意図(Intent)'] },
                { label: 'Barrier', value: row['Webサイトのバリア(Barrier)'] },
                { label: '緊急度', value: row['緊急度'] },
                { label: '自己解決可能性', value: row['Web自己解決可能性'] }
            ];

            const fieldsHTML = fields.map(f => `
                <div class="modal-field">
                    <label>${f.label}</label>
                    <span>${f.value || '不明'}</span>
                </div>
            `).join('');

            document.getElementById('modalFields').innerHTML = fieldsHTML;
            
            const conversation = row['会話全文(整形済)'] || row['本文(整形済)'] || row['会話要約'] || row['問い合わせ要約'] || 'データなし';
            document.getElementById('modalConversation').textContent = conversation;

            document.getElementById('detailModal').style.display = 'flex';
        }

        // モーダルを閉じる
        function closeModal() {
            document.getElementById('detailModal').style.display = 'none';
        }

        // タブ切り替え
        function switchTab(tabName) {
            // タブボタンのアクティブ状態を切り替え
            document.querySelectorAll('.nav-tab').forEach(tab => tab.classList.remove('active'));
            event.target.classList.add('active');

            // タブコンテンツを切り替え
            document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
            document.getElementById(tabName).classList.add('active');
        }

        // 初期化
        document.addEventListener('DOMContentLoaded', () => {
            loadData();
        });

        // モーダル外クリックで閉じる
        window.onclick = function(event) {
            const modal = document.getElementById('detailModal');
            if (event.target === modal) {
                closeModal();
            }
        };
    </script>
</body>
</html>
